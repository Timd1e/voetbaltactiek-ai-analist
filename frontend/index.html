<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodale AI Video-Analist</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Voetbaltactiek AI Analist</h1>
        
        <div class="upload-card">
            <input type="file" id="videoInput" accept="video/mp4">
            <div id="loading" class="hidden loader-text">🤖 AI analyseert fragment... Even geduld.</div>
        </div>

        <div class="dashboard hidden" id="dashboard">
            <div class="video-section">
                <div class="video-container">
                    <video id="videoPlayer" controls preload="metadata"></video>
                </div>
                
                <div class="timeline-container">
                    <div class="time-labels">
                        <span id="labelStart">00:00</span>
                        <span id="labelEnd">00:00</span>
                    </div>
                    <div class="slider-track-container">
                        <div class="slider-track" id="sliderTrack"></div>
                        <div class="slider-handle" id="handleStart" title="Starttijd slepen"></div>
                        <div class="slider-handle" id="handleEnd" title="Eindtijd slepen"></div>
                    </div>
                </div>

                <button id="uploadBtn" class="analyze-btn">Analyseer Geselecteerd Fragment</button>
            </div>

            <div class="feedback-container">
                <h2>Tactische Adviezen</h2>
                <ul id="tipsList"></ul>
            </div>
        </div>
    </div>

    <script src="js/player.js"></script>
    <script src="js/app.js"></script><div class="video-container">
    <video id="videoPlayer" controls preload="metadata"></video>
</div>
</body>
</html>
